    <style>
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            overflow-x: hidden;
            width: 100%;
        }

        /* 背景メッシュグラデーション */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #f5f5f7;
        }

        .blob {
            position: absolute;
            filter: blur(90px);
            opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
            border-radius: 50%;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #ffb6ff;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #b6d8ff;
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%;
            left: 30%;
            width: 40vw;
            height: 40vw;
            background: #e0c3fc;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(8%, 12%) scale(1.15);
            }
        }

        /* Liquid Glass デザインの強化・透け感の調整 */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-right-color: rgba(255, 255, 255, 0.2);
            border-bottom-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            border-radius: 1.5rem;
        }

        .glass-nav {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-bottom-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
        }

        .glass-button {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.1) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-right-color: rgba(255, 255, 255, 0.3);
            border-bottom-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        .text-gradient {
            background: linear-gradient(135deg, #1d1d1f 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fade-in-section {
            opacity: 0;
            transform: translateY(30px);
            visibility: hidden;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-in-section.is-visible {
            opacity: 1;
            transform: none;
            visibility: visible;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        /* モーダル・メニュー表示時の背景固定とガタつき防止 */
        body.no-scroll {
            overflow: hidden;
            padding-right: var(--scrollbar-width, 0px);
        }

        /* Fixed position elements shifting prevention */
        body.no-scroll #nav-container {
            width: calc(100% - var(--scrollbar-width, 0px));
        }

        body.no-scroll #detail-modal,
        body.no-scroll #mobile-menu {
            right: var(--scrollbar-width, 0px);
        }

        /* 独自スクロールバー（更新履歴用） */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.02);
            border-radius: 8px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        /* モーダル内の画像最大幅の制限（PC用） */
        @media (min-width: 768px) {
            #modal-body img {
                max-width: 75%;
                margin-left: auto;
                margin-right: auto;
            }

            #modal-body .group img,
            #modal-body .grid img {
                max-width: 100%;
                margin: 0;
            }
        }
    </style>

            // Research
            const renderResearchContainer = document.getElementById('research-container');
            renderResearchContainer.innerHTML = '';
            data.research.forEach((item, index) => {
                renderResearchContainer.innerHTML += `
                    <div class="glass-panel p-6 md:p-8 flex flex-col md:flex-row gap-5 md:gap-8 items-start transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:bg-white/20 cursor-pointer group" data-research-index="${index}">
                        <div class="w-14 h-14 md:w-16 md:h-16 rounded-2xl glass-button flex items-center justify-center text-appleBlue text-2xl md:text-3xl shrink-0 shadow-sm group-hover:scale-105 transition-transform">

                            <p class="text-appleDark/80 leading-relaxed text-sm md:text-base mb-3">${item.description}</p>
                            <div class="inline-flex items-center text-sm font-medium text-appleBlue bg-appleBlue/10 px-3 py-1.5 rounded-full group-hover:bg-appleBlue/20 transition-colors">
                                ${t.viewDetails} <i class="fa-solid fa-arrow-right ml-1.5 text-xs group-hover:translate-x-1 transition-transform"></i>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Projects
            const renderProjectsContainer = document.getElementById('projects-container');
            renderProjectsContainer.innerHTML = '';
            data.projects.forEach((project, index) => {
                const techTags = project.techStack.map(tech => `<span class="text-xs font-semibold text-appleDark/80 bg-black/5 px-2.5 py-1 rounded-md border border-black/5">${tech}</span>`).join('');
                const links = project.links.map(link => `<a href="${link.url}" target="_blank" rel="noopener noreferrer" class="w-10 h-10 flex items-center justify-center glass-button rounded-full text-appleDark hover:text-appleBlue hover:scale-105 transition-all relative z-10 shadow-sm" aria-label="${link.type}"><i class="${link.icon}"></i></a>`).join('');

                renderProjectsContainer.innerHTML += `
                    <div class="glass-panel p-2 flex flex-col group cursor-pointer hover:-translate-y-2 hover:shadow-xl transition-all duration-300 hover:bg-white/20" data-project-index="${index}">
                        <div class="relative h-48 md:h-56 overflow-hidden rounded-[1.2rem] border border-black/5">
                            <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                        </div>
                        <div class="p-6 flex-grow flex flex-col">
                            <h3 class="text-xl font-bold mb-3 text-appleDark flex justify-between items-start gap-2">
                                <span>${project.title}</span>
                            </h3>
                            <p class="text-appleDark/80 text-sm mb-5 flex-grow leading-relaxed">${project.description}</p>
                            <div class="flex flex-wrap gap-2 mb-4">${techTags}</div>
                            <div class="flex items-center justify-between mt-auto pt-4 border-t border-black/5">
                                <div class="inline-flex items-center text-sm font-medium text-appleBlue">
                                    ${t.viewDetails} <i class="fa-solid fa-arrow-right ml-1.5 text-xs group-hover:translate-x-1 transition-transform"></i>
                                </div>
                                <div class="flex items-center gap-3">${links}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Achievements
            const renderAchievementsContainer = document.getElementById('achievements-container');
            renderAchievementsContainer.innerHTML = '';
            data.achievements.forEach((ach, index) => {
                renderAchievementsContainer.innerHTML += `<div class="glass-panel p-6 sm:p-8 hover:-translate-y-1 hover:shadow-lg hover:bg-white/20 transition-all duration-300 cursor-pointer group flex flex-col h-full" data-achievement-index="${index}"><div class="flex items-start gap-4 sm:gap-6"><div class="flex items-center justify-center w-12 h-12 rounded-full glass-button text-appleBlue shrink-0 group-hover:scale-110 transition-transform shadow-sm"><i class="fa-solid fa-award text-lg"></i></div><div class="flex-grow"><span class="inline-block px-2.5 py-1 bg-appleDark text-white text-[10px] font-bold rounded-md tracking-wider mb-3 shadow-sm">${ach.date}</span><h3 class="text-lg sm:text-xl font-bold text-appleDark mb-2 leading-tight group-hover:text-appleBlue transition-colors">${ach.title}</h3><p class="text-sm text-appleDark/70 leading-relaxed mb-3">${ach.summary}</p><div class="inline-flex items-center text-sm font-medium text-appleBlue bg-appleBlue/10 px-3 py-1.5 rounded-full group-hover:bg-appleBlue/20 transition-colors">${t.viewDetails} <i class="fa-solid fa-arrow-right ml-1.5 text-xs group-hover:translate-x-1 transition-transform"></i></div></div></div></div>`;
            });

            // Timeline
            const timelineContainer = document.getElementById('timeline-container');
            timelineContainer.innerHTML = '';
            data.timeline.forEach((item) => {
                timelineContainer.innerHTML += `<div class="relative pl-6 md:pl-10 group"><div class="absolute left-[-13px] top-8 w-6 h-6 glass-button rounded-full flex items-center justify-center transition-transform duration-300 group-hover:scale-110 z-10 shadow-sm"><div class="w-2.5 h-2.5 bg-appleBlue rounded-full"></div></div><div class="glass-panel p-6 md:p-8 hover:-translate-y-1 transition-all duration-300 hover:shadow-lg hover:bg-white/20"><div class="flex flex-col md:flex-row md:items-center gap-3 mb-4"><span class="inline-block px-3 py-1 bg-appleDark text-white text-xs font-bold rounded-md tracking-wider w-fit shadow-sm">${item.year}</span><h3 class="text-xl font-bold text-appleDark">${item.title}</h3></div>${item.subtitle ? `<h4 class="text-md font-semibold text-appleGray mb-3">${item.subtitle}</h4>` : ''}<p class="text-appleDark/80 text-sm leading-relaxed">${item.description}</p></div></div>`;
            });
            timelineContainer.innerHTML += `<svg class="absolute top-full left-[-9px] w-[16px] h-[14px] text-appleBlue/20 overflow-visible !mt-0" viewBox="0 0 16 14" fill="none"><line x1="8" y1="0" x2="8" y2="12" stroke="currentColor" stroke-width="2" /><path d="M2 6 L8 12 L14 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" /></svg>`;

            // Contact
            document.getElementById('contact-text').textContent = data.contactText;
            document.getElementById('contact-email-btn').href = `mailto:${data.profile.email}`;
            const socialLinksContainer = document.getElementById('social-links');
            socialLinksContainer.innerHTML = '';
            data.socials.forEach(social => { socialLinksContainer.innerHTML += `<a href="${social.url}" target="_blank" rel="noopener noreferrer" class="w-12 h-12 flex items-center justify-center rounded-full glass-button text-appleDark hover:text-appleBlue hover:scale-110 transition-all shadow-sm" aria-label="${social.name}"><i class="${social.icon} text-xl"></i></a>`; });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Language Detection & Defaulting
            const browserLang = navigator.language || navigator.userLanguage;
            if (browserLang && !browserLang.startsWith('ja')) {
                currentLang = 'en';
            }
            renderAll(currentLang);

            // Language Toggle Event
            const langToggleBtn = document.getElementById('lang-toggle-btn');
            langToggleBtn.addEventListener('click', () => {
                currentLang = currentLang === 'ja' ? 'en' : 'ja';
                renderAll(currentLang);
            });



            // Modal System
            const modal = document.getElementById('detail-modal');
            const modalContentBox = document.getElementById('modal-content-box');
            const modalCloseBtn = document.getElementById('modal-close');

            const updateScrollbarWidth = () => {
                const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
                document.documentElement.style.setProperty('--scrollbar-width', `${scrollbarWidth}px`);
            };

            updateScrollbarWidth();
            window.addEventListener('resize', updateScrollbarWidth);

            const openModal = (title, date, bodyHtml) => {
                updateScrollbarWidth();

                document.getElementById('modal-title').textContent = title;
                const dateEl = document.getElementById('modal-date');
                if (date) {
                    dateEl.textContent = date;
                    dateEl.classList.remove('hidden');
                    dateEl.classList.add('inline-block');
                } else {
                    dateEl.classList.add('hidden');
                    dateEl.classList.remove('inline-block');
                }

                const modalBody = document.getElementById('modal-body');
                modalBody.innerHTML = `<div class="text-appleDark/80 leading-relaxed space-y-4 text-[15px] sm:text-base">${bodyHtml}</div>`;

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                document.body.classList.add('no-scroll');

                // モーダルが表示(display: flex)されてからスクロール位置をリセットする
                modalBody.scrollTop = 0;

                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContentBox.classList.remove('scale-95');
                    modalContentBox.classList.add('scale-100');
                }, 10);
            };

            const closeModal = () => {
                modal.classList.add('opacity-0');
                modalContentBox.classList.remove('scale-100');
                modalContentBox.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    document.body.classList.remove('no-scroll');
                }, 300);
            };


            // Event Listeners for Modals
            const researchContainer = document.getElementById('research-container');
            const achievementsContainer = document.getElementById('achievements-container');
            const projectsContainer = document.getElementById('projects-container');

            researchContainer.addEventListener('click', (e) => {
                const card = e.target.closest('[data-research-index]');
                if (!card) return;
                const index = card.getAttribute('data-research-index');
                const data = currentLang === 'ja' ? portfolioDataJa : portfolioDataEn;
                const res = data.research[index];
                const contentHtml = res.details || `<p>${res.description}</p>`;
                openModal(res.title, res.period, contentHtml);
            });

            achievementsContainer.addEventListener('click', (e) => {
                const card = e.target.closest('[data-achievement-index]');
                if (!card) return;
                const index = card.getAttribute('data-achievement-index');
                const data = currentLang === 'ja' ? portfolioDataJa : portfolioDataEn;
                const ach = data.achievements[index];
                openModal(ach.title, ach.date, ach.description);
            });

            projectsContainer.addEventListener('click', (e) => {
                if (e.target.closest('a')) return;

                const card = e.target.closest('[data-project-index]');
                if (!card) return;
                const index = card.getAttribute('data-project-index');
                const data = currentLang === 'ja' ? portfolioDataJa : portfolioDataEn;
                const proj = data.projects[index];
                const t = translations[currentLang];

                let contentHtml = '';

                // モーダル上部にサムネイル画像を表示
                if (proj.image) {
                    contentHtml += `<img src="${proj.image}" alt="${proj.title}" class="w-full max-h-80 object-cover rounded-xl mb-6 border border-black/5 shadow-sm">`;
                }

                contentHtml += proj.details || `<p>${proj.description}</p>`;

                if (proj.links && proj.links.length > 0) {
                    const linkButtons = proj.links.map(link => {
                        let text = t.otherLink;
                        if (link.type === 'github') text = t.githubLink;
                        else if (link.type === 'demo') text = t.demoLink;

                        return `<a href="${link.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-5 py-2.5 bg-appleDark text-white hover:bg-black rounded-full text-sm font-medium transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5"><i class="${link.icon} mr-2"></i>${text}</a>`;
                    }).join('');

                    contentHtml += `<div class="mt-8 pt-6 border-t border-black/10 flex flex-wrap gap-4">${linkButtons}</div>`;
                }

                openModal(proj.title, null, contentHtml);
            });

            // モーダル内のスクロールリンクの処理
            document.getElementById('modal-body').addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-scroll-link')) {
                    e.preventDefault();
                    const targetId = e.target.getAttribute('data-target');
                    closeModal();
                    setTimeout(() => {
                        const targetElement = document.getElementById(targetId);
                        if (targetElement) {
                            targetElement.scrollIntoView({ behavior: 'smooth' });
                        }
                    }, 300); // モーダルが閉じるアニメーションを待ってからスクロール
                }
            });

            modalCloseBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

            // ESCキーでモーダルを閉じる
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            });


            // Menu Toggle
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = mobileMenuBtn.querySelector('i');
            function toggleMenu() {
                updateScrollbarWidth();
                mobileMenu.classList.toggle('hidden');
                mobileMenu.classList.toggle('flex');
                if (mobileMenu.classList.contains('hidden')) {
                    menuIcon.classList.replace('fa-xmark', 'fa-bars');
                    document.body.classList.remove('no-scroll');
                } else {
                    menuIcon.classList.replace('fa-bars', 'fa-xmark');
                    document.body.classList.add('no-scroll');
                }
            }
            mobileMenuBtn.addEventListener('click', toggleMenu);
            document.querySelectorAll('.mobile-link').forEach(link => { link.addEventListener('click', toggleMenu); });

            // Observer
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('is-visible'); observer.unobserve(entry.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-in-section').forEach(section => { observer.observe(section); });
        });
    </script>
